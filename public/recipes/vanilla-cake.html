<h1>Vanilla Cake</h1>

<p>
Soft fluffy vanilla sponge cake for beginners.
</p>

<h2>Ingredients</h2>

<ul>
<li>2 Eggs</li>
<li>1 Cup Flour</li>
<li>1 Cup Sugar</li>
<li>Vanilla Extract</li>
</ul>

<h2>Instructions</h2>

<ol>
<li>Mix all ingredients.</li>
<li>Pour into cake tray.</li>
<li>Bake at 180°C.</li>
<li>Cool and decorate.</li>
</ol>
