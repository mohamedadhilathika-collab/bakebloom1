<h1>Chocolate Brownies</h1>

<p>
Easy homemade brownies for beginners.
</p>

<h2>Ingredients</h2>

<ul>
<li>2 Eggs</li>
<li>1 Cup Flour</li>
<li>Chocolate Chips</li>
<li>Butter</li>
</ul>

<h2>Instructions</h2>

<ol>
<li>Mix ingredients.</li>
<li>Pour into tray.</li>
<li>Bake for 30 mins.</li>
<li>Cool and serve.</li>
</ol>
