<h1>Vanilla Cupcakes</h1>

<p>
Soft bakery-style cupcakes perfect for beginners.
</p>

<h2>Ingredients</h2>

<ul>
<li>2 Eggs</li>
<li>1 Cup Flour</li>
<li>Butter</li>
<li>Vanilla Extract</li>
<li>Sugar</li>
</ul>

<h2>Instructions</h2>

<ol>
<li>Mix all ingredients.</li>
<li>Pour batter into cupcake molds.</li>
<li>Bake at 180°C for 20 mins.</li>
<li>Cool and add frosting.</li>
</ol>
